<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS logistics | Оптимизация маршрутов</title>
    <style>
        :root {
            --bg-cream: #FDFCF0;
            --airy-blue: #A9CDE5;
            --airy-blue-hover: #8AB8D4;
            --text-dark: #2C3E50;
            --text-light: #5A6A7A;
            --card-bg: #FFFFFF;
            --shadow: 0 12px 35px rgba(0, 0, 0, 0.05);
            --radius-large: 24px;
            --radius-medium: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--airy-blue);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(169, 205, 229, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 28px; font-weight: 800; color: white; }
        
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .sidebar {
            background: white;
            border-radius: var(--radius-large);
            padding: 25px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .sidebar h3 { margin-bottom: 20px; color: var(--text-dark); border-bottom: 2px solid var(--bg-cream); padding-bottom: 10px; }
        
        .project-list { max-height: 60vh; overflow-y: auto; }
        .project-item {
            padding: 12px;
            border-radius: var(--radius-medium);
            background: var(--bg-cream);
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            border: 1px solid transparent;
        }
        .project-item:hover { border-color: var(--airy-blue); background: white; }
        .project-item .name { font-weight: bold; display: block; margin-bottom: 4px; }
        .project-item .route-info { font-size: 0.8rem; color: var(--text-light); }
        .project-item .delete-btn {
            position: absolute;
            top: 10px; right: 10px;
            color: #ff4d4f;
            font-size: 1.2rem;
            opacity: 0.3;
        }
        .project-item:hover .delete-btn { opacity: 1; }

        .calc-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-large);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #E5EAF0;
            border-radius: var(--radius-medium);
            outline: none;
            font-size: 1rem;
        }

        .btn {
            padding: 14px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--airy-blue); color: white; }
        .btn-secondary { background: #f0f0f0; color: var(--text-dark); }
        .btn-success { background: #28a745; color: white; }
        .btn-add { background: #e8f4fd; color: #2b80ff; width: 100%; margin-bottom: 15px; }

        .stop-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn-remove { color: #ff4d4f; cursor: pointer; font-weight: bold; }

        #compare-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: var(--radius-medium);
            display: none;
        }

        .results-wrapper { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
        .results-wrapper.side-by-side { grid-template-columns: 1fr 1fr; }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: var(--radius-large);
            box-shadow: var(--shadow);
        }

        .diff-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .diff-plus { background: #ffebeb; color: #d93025; }
        .diff-minus { background: #e6f4ea; color: #1e8e3e; }

        .weather-box {
            background: #f0f9ff;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.85rem;
            border-left: 4px solid #0ea5e9;
        }

        .step { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MAS logistics</div>
        <div style="color:white; font-weight: bold;">Weather-Aware Routing</div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>📂 Проекты</h3>
            <div id="project-list" class="project-list"></div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button class="btn btn-success" style="width: 100%;" onclick="saveAsProject()">💾 Сохранить проект</button>
        </aside>

        <main class="content">
            <div class="calc-container">
                <h2 style="margin-bottom: 25px;">Маршрутизатор</h2>
                <div class="form-group">
                    <label>Точка А:</label>
                    <input type="text" id="startCity" value="Cairo">
                </div>
                <div id="stops-container"></div>
                <button class="btn btn-add" onclick="addStop()">+ Добавить остановку</button>
                <div class="form-group">
                    <label>Точка Б:</label>
                    <input type="text" id="endCity" value="Alexandria">
                </div>
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div style="flex: 2;">
                        <label>Метод 1:</label>
                        <select id="method1" onchange="toggleConstraints(1)">
                            <option value="multi_criteria">Оптимальный</option>
                            <option value="dijkstra_cost">Дешевле</option>
                            <option value="dijkstra_time">Быстрее</option>
                            <option value="constrained">Ограничения</option>
                        </select>
                    </div>
                    <div style="flex: 1; display: flex; align-items: flex-end;">
                        <button class="btn btn-secondary" id="compare-toggle" onclick="toggleCompareMode()" style="width: 100%;">Сравнить</button>
                    </div>
                </div>
                <div id="constraint-1" style="display:none; background:#f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                    <div style="display:flex; gap:10px;">
                        <select id="cType1" style="width: 130px;"><option value="time">Время</option><option value="cost">Цена</option></select>
                        <input type="number" id="cVal1" placeholder="Лимит...">
                    </div>
                </div>
                <div id="compare-section">
                    <div class="form-group">
                        <label>Метод 2:</label>
                        <select id="method2" onchange="toggleConstraints(2)">
                            <option value="dijkstra_time">Быстрее</option>
                            <option value="dijkstra_cost">Дешевле</option>
                            <option value="multi_criteria">Оптимальный</option>
                            <option value="constrained">Ограничения</option>
                        </select>
                    </div>
                    <div id="constraint-2" style="display:none; background:#f0f7ff; padding: 15px; border-radius: 12px;">
                        <div style="display:flex; gap:10px;">
                            <select id="cType2" style="width: 130px;"><option value="time">Время</option><option value="cost">Цена</option></select>
                            <input type="number" id="cVal2" placeholder="Лимит...">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="processRoute()">🚀 Найти маршрут</button>
            </div>
            <div id="results-area" class="results-wrapper"></div>
        </main>
    </div>

    <script>
        let compareMode = false;
        let lastCalculatedResult = null;
        const API_BASE = "http://127.0.0.1:8000/api";

        document.addEventListener('DOMContentLoaded', loadProjects);

        async function loadProjects() {
            try {
                const res = await fetch(`${API_BASE}/projects`);
                const projects = await res.json();
                const list = document.getElementById('project-list');
                list.innerHTML = Object.values(projects).map(p => `
                    <div class="project-item" onclick="applyProject('${p.id}')">
                        <span class="name">${p.name}</span>
                        <span class="route-info">${p.start} ➔ ${p.end}</span>
                        <span class="delete-btn" onclick="deleteProject(event, '${p.id}')">✕</span>
                    </div>
                `).join('') || '<p style="font-style:italic">Нет проектов</p>';
            } catch (e) { console.error(e); }
        }

        async function saveAsProject() {
            const name = prompt("Название проекта:");
            if (!name) return;
            const project = {
                name,
                start: document.getElementById('startCity').value,
                end: document.getElementById('endCity').value,
                stops: Array.from(document.querySelectorAll('.stop-input')).map(i => i.value),
                method: document.getElementById('method1').value,
                last_result: lastCalculatedResult
            };
            if (project.method === 'constrained') {
                project.constraint_type = document.getElementById('cType1').value;
                project.constraint_value = parseFloat(document.getElementById('cVal1').value);
            }
            await fetch(`${API_BASE}/projects`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(project)
            });
            loadProjects();
        }

        async function applyProject(id) {
            const res = await fetch(`${API_BASE}/projects`);
            const projects = await res.json();
            const p = projects[id];
            document.getElementById('startCity').value = p.start;
            document.getElementById('endCity').value = p.end;
            const container = document.getElementById('stops-container');
            container.innerHTML = '';
            p.stops.forEach(s => {
                const div = document.createElement('div');
                div.className = 'stop-item';
                div.innerHTML = `<input type="text" class="stop-input" value="${s}"><span class="btn-remove" onclick="this.parentElement.remove()">✕</span>`;
                container.appendChild(div);
            });
            document.getElementById('method1').value = p.method;
            toggleConstraints(1);
            if (p.method === 'constrained') {
                document.getElementById('cType1').value = p.constraint_type;
                document.getElementById('cVal1').value = p.constraint_value;
            }
            if (p.last_result) displayResults(p.last_result, null);
            else processRoute();
        }

        async function deleteProject(e, id) {
            e.stopPropagation();
            if (confirm("Удалить?")) {
                await fetch(`${API_BASE}/projects/${id}`, { method: 'DELETE' });
                loadProjects();
            }
        }

        function addStop() {
            const div = document.createElement('div');
            div.className = 'stop-item';
            div.innerHTML = `<input type="text" class="stop-input" placeholder="Город..."><span class="btn-remove" onclick="this.parentElement.remove()">✕</span>`;
            document.getElementById('stops-container').appendChild(div);
        }

        function toggleCompareMode() {
            compareMode = !compareMode;
            document.getElementById('compare-section').style.display = compareMode ? 'block' : 'none';
            document.getElementById('compare-toggle').innerText = compareMode ? 'Отмена' : 'Сравнить';
        }

        function toggleConstraints(num) {
            document.getElementById('constraint-' + num).style.display = 
                document.getElementById('method' + num).value === 'constrained' ? 'block' : 'none';
        }

        async function processRoute() {
            const area = document.getElementById('results-area');
            area.innerHTML = "<p>Загрузка...</p>";
            try {
                const getBody = (n) => ({
                    start: document.getElementById('startCity').value,
                    end: document.getElementById('endCity').value,
                    stops: Array.from(document.querySelectorAll('.stop-input')).map(i => i.value),
                    method: document.getElementById('method' + n).value,
                    constraint_type: document.getElementById('cType' + n).value,
                    constraint_value: parseFloat(document.getElementById('cVal' + n).value)
                });
                const r1 = await (await fetch(`${API_BASE}/find_route`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(getBody(1))
                })).json();
                lastCalculatedResult = r1;
                let r2 = compareMode ? await (await fetch(`${API_BASE}/find_route`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(getBody(2))
                })).json() : null;
                displayResults(r1, r2);
            } catch (e) { area.innerHTML = `<p style="color:red">${e.message}</p>`; }
        }

        function displayResults(r1, r2) {
            const area = document.getElementById('results-area');
            area.className = r2 ? 'results-wrapper side-by-side' : 'results-wrapper';
            area.innerHTML = renderCard(r1, "Вариант 1", r2) + (r2 ? renderCard(r2, "Вариант 2", r1) : "");
        }

        function renderCard(data, title, other) {
            if (data.detail) return `<div class="result-card" style="color:red">${data.detail}</div>`;
            let diffs = "";
            if (other && !other.detail) {
                const cD = (data.total_cost - other.total_cost).toFixed(1);
                const tD = (data.total_time - other.total_time).toFixed(1);
                diffs = `<div style="margin-bottom:10px">
                    <span class="diff-badge ${cD<=0?'diff-minus':'diff-plus'}">${cD<=0?'':'+'}${cD} у.е.</span>
                    <span class="diff-badge ${tD<=0?'diff-minus':'diff-plus'}">${tD<=0?'':'+'}${tD} ч.</span>
                </div>`;
            }

            // Using weather_reports from backend
            const routeWithWeather = data.route.map(city => {
                const weather = data.weather_reports[city] || '...';
                return `<b>${city}</b> <span style="color:#0ea5e9; font-size:0.8rem;">(${weather})</span>`;
            }).join(' → ');

            return `<div class="result-card">
                <h4>${title} (${data.method_used})</h4>
                ${diffs}
                <div style="font-size:1.3rem;font-weight:bold;margin:10px 0">${data.total_cost} у.е. | ${data.total_time} ч.</div>
                
                <div style="background:#f8fafc; padding:12px; border-radius:8px; margin-bottom:15px; border:1px solid #e2e8f0; line-height:1.8;">
                    ${routeWithWeather}
                </div>

                <div class="steps-list">${data.details.map(s => `
                    <div class="step">
                        <b>${s.from_city} → ${s.to_city}</b> (${s.transport})<br>
                        <span style="color:#64748b;">${s.cost} у.е. | ${s.time} ч.</span>
                    </div>
                `).join('')}</div>
            </div>`;
        }
    </script>
</body>
</html>
